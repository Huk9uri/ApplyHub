services:
  postgres:
    image: postgres:16-alpine
    container_name: applyhub-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: applyhub
      POSTGRES_PASSWORD: applyhub
      POSTGRES_DB: applyhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applyhub -d applyhub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
