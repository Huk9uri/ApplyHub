services:
  mysql:
    image: mysql:8.4
    container_name: applyhub-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: applyhub
      MYSQL_USER: applyhub
      MYSQL_PASSWORD: applyhub
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u applyhub -papplyhub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
