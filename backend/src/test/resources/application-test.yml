spring:
  datasource:
    url: jdbc:h2:mem:applyhub;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  jwt:
    secret: dGVzdC1zZWNyZXQta2V5LWZvci1hcHBseWh1Yi1qd3Qtb3Zlci0zMg==
    expiration-ms: 86400000
  cors:
    allowed-origin: http://localhost:3000
